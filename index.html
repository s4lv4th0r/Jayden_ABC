<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>ABC Caligrafia - Jayden</title>
<link href="https://fonts.googleapis.com/css2?family=Playwrite+ES&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: linear-gradient(160deg, #ffecd2, #fcb69f, #a1c4fd); min-height: 100vh; }

@keyframes bounceIn {
  0%   { transform: scale(0) translateY(60px); opacity: 0; }
  50%  { transform: scale(1.15) translateY(-10px); opacity: 1; }
  70%  { transform: scale(0.95) translateY(4px); }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
@keyframes swing {
  0%,100% { transform: rotate(-4deg); }
  50%      { transform: rotate(4deg); }
}
@keyframes shake {
  0%,100% { transform: translateX(0) rotate(0deg); }
  20%     { transform: translateX(-12px) rotate(-3deg); }
  40%     { transform: translateX(12px) rotate(3deg); }
  60%     { transform: translateX(-8px) rotate(-2deg); }
  80%     { transform: translateX(8px) rotate(2deg); }
}
@keyframes vibrate {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-4px); }
  75%     { transform: translateX(4px); }
}
@keyframes coinSpin {
  0%   { transform: scale(0) rotateY(0deg); opacity: 0; }
  30%  { transform: scale(1.2) rotateY(180deg); opacity: 1; }
  60%  { transform: scale(1) rotateY(360deg); opacity: 1; }
  80%  { transform: scale(1.05) rotateY(420deg); }
  100% { transform: scale(1) rotateY(360deg); opacity: 1; }
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.06); }
}
@keyframes fadeInUp {
  0%   { opacity: 0; transform: translateY(16px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes redFlash {
  0%,100% { background: rgba(255,255,255,0.95); }
  30%     { background: rgba(255,80,80,0.15); }
}
@keyframes coinFloat {
  0%,100% { transform: translateY(0px) scaleX(1); }
  25%     { transform: translateY(-6px) scaleX(0.6); }
  50%     { transform: translateY(-8px) scaleX(1); }
  75%     { transform: translateY(-4px) scaleX(0.6); }
}
@keyframes coinSpinCSS {
  0%   { transform: scaleX(1); }
  25%  { transform: scaleX(0.1); }
  50%  { transform: scaleX(1); }
  75%  { transform: scaleX(0.1); }
  100% { transform: scaleX(1); }
}
</style>
<script>
window.addEventListener('load', function() {
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><rect width="120" height="120" rx="24" fill="#ffecd2"/><ellipse cx="60" cy="72" rx="42" ry="36" fill="#c8a96e"/><ellipse cx="60" cy="58" rx="32" ry="28" fill="#c8a96e"/><ellipse cx="43" cy="28" rx="9" ry="19" fill="#c8a96e" transform="rotate(-10,43,28)"/><ellipse cx="77" cy="28" rx="9" ry="19" fill="#c8a96e" transform="rotate(10,77,28)"/><ellipse cx="43" cy="24" rx="5" ry="13" fill="#e8c99e" transform="rotate(-10,43,24)"/><ellipse cx="77" cy="24" rx="5" ry="13" fill="#e8c99e" transform="rotate(10,77,24)"/><ellipse cx="60" cy="80" rx="20" ry="14" fill="#d4b483"/><circle cx="54" cy="82" r="3.5" fill="#555"/><circle cx="66" cy="82" r="3.5" fill="#555"/><circle cx="48" cy="52" r="7" fill="white"/><circle cx="49" cy="53" r="4" fill="#333"/><circle cx="50" cy="52" r="1.5" fill="white"/><path d="M66 50 Q73 46 78 50" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M66 50 Q73 54 78 50" stroke="#c8a96e" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M44 68 Q60 80 76 68" stroke="#7a5c2e" stroke-width="2.5" fill="none" stroke-linecap="round"/><rect x="52" y="68" width="7" height="5" rx="1" fill="white"/><rect x="61" y="68" width="7" height="5" rx="1" fill="white"/><ellipse cx="38" cy="65" rx="7" ry="4" fill="#e8a090" opacity="0.5"/><ellipse cx="82" cy="65" rx="7" ry="4" fill="#e8a090" opacity="0.5"/></svg>';
  var enc = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  var l = document.createElement('link'); l.rel='icon'; l.type='image/svg+xml'; l.href=enc; document.head.appendChild(l);
  var a = document.createElement('link'); a.rel='apple-touch-icon'; a.href=enc; document.head.appendChild(a);
});
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const LT = ["A","B","C","D","E","F","G","H","I","J","K","L","M","N","\u00d1","O","P","Q","R","S","T","U","V","W","X","Y","Z"];
const WD = ["Avion","Barco","Casa","Delfin","Estrella","Flor","Gato","Helado","Iguana","Jirafa","Koala","Luna","Manzana","Nube","Name","Oso","Pato","Queso","Rana","Sol","Tortuga","Uva","Vaca","Water","Xilofono","Yoyo","Cebra"];
const CL = ["#e74c3c","#e67e22","#f39c12","#27ae60","#2980b9","#8e44ad","#16a085","#c0392b","#d35400","#2c3e50","#e74c3c","#e67e22","#f39c12","#27ae60","#2980b9","#8e44ad","#16a085","#c0392b","#d35400","#27ae60","#e74c3c","#e67e22","#f39c12","#27ae60","#2980b9","#8e44ad","#16a085"];

function App() {
  const [idx, setIdx] = useState(0);
  const [mode, setMode] = useState("may");
  const [strokes, setStrokes] = useState([]);
  const [cur, setCur] = useState([]);
  const [validated, setValidated] = useState(false);
  const [result, setResult] = useState(null);
  const [coins, setCoins] = useState(0);
  const [learnedMay, setLearnedMay] = useState([]);
  const [learnedMin, setLearnedMin] = useState([]);
  const [learnedWord, setLearnedWord] = useState([]);
  const [fontOk, setFontOk] = useState(false);
  const canvasRef = useRef(null);
  const drawingRef = useRef(false);
  const curRef = useRef([]);
  const strokesRef = useRef([]);

  useEffect(() => {
    document.fonts.ready.then(() => setFontOk(true));
    setTimeout(() => setFontOk(true), 3000);
  }, []);

  useEffect(() => { strokesRef.current = strokes; }, [strokes]);
  useEffect(() => { drawCanvas(); }, [strokes, cur, idx, mode, fontOk]);

  const c = CL[idx];
  const letter = LT[idx];
  const word = WD[idx];
  const dl = mode === "may" ? letter : mode === "min" ? letter.toLowerCase() : word;
  const PW = "'Playwrite ES', cursive";
  const reward = mode === "word" ? 5 : 3;

  const getPos = (e) => {
    const canvas = canvasRef.current;
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * canvas.width / r.width, y: (src.clientY - r.top) * canvas.height / r.height };
  };

  const startDraw = (e) => {
    e.preventDefault();
    if (validated) return;
    drawingRef.current = true;
    const p = getPos(e);
    curRef.current = [p]; setCur([p]);
  };

  const moveDraw = (e) => {
    e.preventDefault();
    if (!drawingRef.current) return;
    const p = getPos(e);
    curRef.current = [...curRef.current, p];
    setCur([...curRef.current]);
  };

  const endDraw = (e) => {
    if (e) e.preventDefault();
    if (!drawingRef.current) return;
    drawingRef.current = false;
    const ns = [...strokesRef.current, curRef.current];
    strokesRef.current = ns; setStrokes(ns);
    setCur([]); curRef.current = [];
  };

  const drawCanvas = () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, 430, 340);
    ctx.fillStyle = "#FFFEF7"; ctx.fillRect(0, 0, 430, 340);
    [[55,"#f4a0a0",[],2],[130,"#c8dff8",[8,5],1.5],[210,"#c8dff8",[8,5],1.5],[285,"#f4a0a0",[],2]].forEach(([y,col,d,w]) => {
      ctx.beginPath(); ctx.moveTo(16,y); ctx.lineTo(414,y);
      ctx.strokeStyle=col; ctx.lineWidth=w; ctx.setLineDash(d); ctx.stroke(); ctx.setLineDash([]);
    });
    if (fontOk) {
      ctx.save();
      ctx.font = (mode==="word"?"72":"280") + "px 'Playwrite ES',cursive";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillStyle = c + "22";
      ctx.fillText(dl, 215, 178);
      ctx.restore();
    }
    [...strokes, cur].forEach(s => {
      if (s.length < 2) return;
      ctx.beginPath(); ctx.moveTo(s[0].x, s[0].y);
      s.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.strokeStyle=c; ctx.lineWidth=mode==="word"?10:14;
      ctx.lineCap="round"; ctx.lineJoin="round"; ctx.stroke();
    });
  };

  const validate = () => {
    if (validated) return;
    const total = strokes.reduce((a,s) => a+s.length, 0);
    if (total < 30) { alert("Dibuja mas!"); return; }
    setValidated(true);
    const pts = strokes.flat();
    const xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
    const rX = Math.max(...xs)-Math.min(...xs), rY = Math.max(...ys)-Math.min(...ys);
    const bien = total > (mode==="word"?150:80) && (rX*rY)/(430*340) > (mode==="word"?0.08:0.04);
    if (bien) {
      setResult("bien");
      if (mode==="may" && !learnedMay.includes(letter)) setLearnedMay(p=>[...p,letter]);
      if (mode==="min" && !learnedMin.includes(letter)) setLearnedMin(p=>[...p,letter]);
      if (mode==="word" && !learnedWord.includes(word)) setLearnedWord(p=>[...p,word]);
      setCoins(n=>n+reward);
      setTimeout(()=>setResult(null), 4000);
    } else {
      setResult("mal");
    }
  };

  const reset = () => {
    setStrokes([]); setCur([]); setValidated(false); setResult(null);
    strokesRef.current=[]; curRef.current=[]; drawingRef.current=false;
  };

  const goTo = (i) => { setIdx(i); reset(); };
  const changeMode = (m) => { setMode(m); reset(); };

  const learned = mode==="may"?learnedMay:mode==="min"?learnedMin:learnedWord;
  const totalLearned = LT.filter(l=>learnedMay.includes(l)||learnedMin.includes(l)).length;

  const ov = {
    position:"absolute",top:0,left:0,right:0,bottom:0,
    display:"flex",flexDirection:"column",alignItems:"center",
    justifyContent:"center",borderRadius:20,zIndex:10,
    padding:"10px"
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#ffecd2,#fcb69f,#a1c4fd)",display:"flex",flexDirection:"column",alignItems:"center",padding:10,userSelect:"none",WebkitUserSelect:"none"}}>

      {/* HEADER */}
      <div style={{background:"white",borderRadius:20,boxShadow:"0 4px 16px rgba(0,0,0,0.12)",padding:"8px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10,width:"100%",maxWidth:430}}>
        <img src="coin_spin.png" width="40" height="40" style={{animation:"coinFloat 1.8s ease-in-out infinite"}} onError={e=>e.target.style.display='none'}/>
        <div>
          <div style={{fontSize:15,fontWeight:"bold",color:"#c0392b",fontFamily:PW}}>ABC Caligrafia</div>
          <div style={{fontSize:13,color:"#e67e22",fontWeight:"bold",fontFamily:PW,animation:"pulse 2s infinite"}}>Hola Jayden! &#127881;</div>
        </div>
        <div style={{marginLeft:"auto",textAlign:"right"}}>
          <div style={{fontSize:16,color:"#f39c12",fontWeight:"bold",display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end"}}>
            <img src="coin_spin.png" width="22" height="22" style={{animation:"coinSpinCSS 1.5s ease-in-out infinite"}} onError={e=>e.target.style.display='none'}/> {coins}
          </div>
          <div style={{fontSize:11,color:"#aaa"}}>&#11088; {totalLearned}/27</div>
        </div>
      </div>

      {/* MODO */}
      <div style={{display:"flex",gap:6,marginBottom:10,width:"100%",maxWidth:430}}>
        {[["may","A May."],["min","a Min."],["word","Palabra"]].map(([m,label])=>(
          <button key={m} onClick={()=>changeMode(m)} style={{flex:1,padding:"10px 0",fontSize:13,fontWeight:"bold",border:"none",borderRadius:14,cursor:"pointer",fontFamily:PW,background:mode===m?c:"rgba(255,255,255,0.6)",color:mode===m?"white":"#555",boxShadow:mode===m?"0 4px 10px "+c+"88":"none",transition:"all .25s"}}>{label}</button>
        ))}
      </div>

      {/* NAV */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,width:"100%",maxWidth:430}}>
        <button onClick={()=>goTo((idx-1+27)%27)} style={{background:"white",border:"none",borderRadius:"50%",width:42,height:42,fontSize:18,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.15)",flexShrink:0}}>{"<"}</button>
        <div style={{flex:1,background:"white",borderRadius:18,padding:"8px 14px",textAlign:"center",boxShadow:"0 4px 14px rgba(0,0,0,0.1)"}}>
          <div style={{fontSize:11,color:"#bbb"}}>Letra {idx+1} de 27</div>
          {mode!=="word" ? (
            <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:16,margin:"4px 0"}}>
              <span style={{fontSize:44,color:c,fontFamily:PW,lineHeight:1.2}}>{letter}</span>
              <span style={{fontSize:44,color:c,fontFamily:PW,lineHeight:1.2,opacity:0.5}}>{letter.toLowerCase()}</span>
            </div>
          ) : (
            <div style={{fontSize:30,color:c,fontFamily:PW,margin:"6px 0"}}>{word}</div>
          )}
          <div style={{fontSize:13,color:"#666"}}>{mode==="word"?"Escribe la palabra completa":word}</div>
        </div>
        <button onClick={()=>goTo((idx+1)%27)} style={{background:"white",border:"none",borderRadius:"50%",width:42,height:42,fontSize:18,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.15)",flexShrink:0}}>{">"}</button>
      </div>

      {/* CANVAS */}
      <div style={{position:"relative",width:"100%",maxWidth:430,marginBottom:10}}>
        <canvas ref={canvasRef} width={430} height={340}
          onMouseDown={startDraw} onMouseMove={moveDraw} onMouseUp={endDraw} onMouseLeave={endDraw}
          onTouchStart={startDraw} onTouchMove={moveDraw} onTouchEnd={endDraw}
          style={{width:"100%",height:"auto",borderRadius:20,touchAction:"none",cursor:validated?"default":"crosshair",boxShadow:"0 4px 20px rgba(0,0,0,0.18)",border:"3px solid "+c+"66"}}
        />
        <div style={{position:"absolute",top:10,left:14,background:c,color:"white",borderRadius:10,padding:"3px 10px",fontSize:11,fontWeight:"bold",fontFamily:PW}}>
          {mode==="may"?"Mayuscula":mode==="min"?"Minuscula":"Palabra"}
        </div>

        {/* OVERLAY BIEN */}
        {result==="bien" && (
          <div style={{...ov,background:"rgba(255,252,230,0.97)"}}>
            {/* Moneda grande giratoria */}
            <div style={{animation:"coinSpin 0.8s ease-out forwards",marginBottom:8}}>
              <img src="coin_spin.png" width="140" height="140"
                style={{filter:"drop-shadow(0 8px 32px rgba(243,156,18,0.8))",animation:"coinSpinCSS 0.4s ease-in-out 3"}}
                onError={e=>{ e.target.style.display='none'; }}
              />
            </div>
            <div style={{fontSize:20,fontWeight:"bold",color:"#f39c12",marginBottom:10,animation:"fadeInUp 0.4s 0.3s ease both"}}>
              +{reward} monedas!
            </div>
            {/* Foto Ines feliz */}
            <div style={{animation:"bounceIn 0.7s 0.2s ease both",transformOrigin:"bottom center"}}>
              <img src="ines_feliz.png" width="220"
                style={{animation:"swing 2s 1s ease-in-out infinite",transformOrigin:"top center",display:"block"}}
                onError={e=>e.target.style.display='none'}
              />
            </div>
            <div style={{fontSize:16,fontWeight:"bold",color:"#27ae60",marginTop:6,fontFamily:PW,animation:"fadeInUp 0.4s 0.6s ease both",textAlign:"center"}}>
              Tu tia Ines esta feliz! &#128149;
            </div>
          </div>
        )}

        {/* OVERLAY MAL */}
        {result==="mal" && (
          <div style={{...ov,background:"rgba(255,245,245,0.97)",animation:"redFlash 0.6s ease"}}>
            {/* Foto Ines enfadada */}
            <div style={{animation:"shake 0.6s ease, vibrate 0.3s 0.7s ease infinite"}}>
              <img src="ines_enfadada.png" width="220"
                style={{display:"block"}}
                onError={e=>e.target.style.display='none'}
              />
            </div>
            {/* Burro */}
            <div style={{marginTop:6,animation:"bounceIn 0.5s 0.4s ease both"}}>
              <img src="burro.png" width="100"
                style={{animation:"vibrate 0.2s 1s ease infinite"}}
                onError={e=>e.target.style.display='none'}
              />
            </div>
            <div style={{fontSize:16,fontWeight:"bold",color:"#e74c3c",marginTop:8,fontFamily:PW,animation:"fadeInUp 0.4s 0.5s ease both",textAlign:"center"}}>
              Tu tia Ines esta triste! &#128546;
            </div>
            <div style={{fontSize:13,color:"#888",marginTop:4}}>
              Repasa: <b style={{color:c,fontFamily:PW}}>{dl}</b>
            </div>
          </div>
        )}
      </div>

      {/* BOTONES */}
      <div style={{display:"flex",gap:8,marginBottom:10,width:"100%",maxWidth:430}}>
        <button onClick={reset} style={{flex:1,padding:"13px 0",fontSize:14,fontWeight:"bold",background:"white",color:"#e74c3c",border:"none",borderRadius:14,cursor:"pointer",boxShadow:"0 3px 10px rgba(0,0,0,0.1)"}}>Borrar</button>
        <button onClick={validate} disabled={validated} style={{flex:1,padding:"13px 0",fontSize:14,fontWeight:"bold",background:validated?"#aaa":"#27ae60",color:"white",border:"none",borderRadius:14,cursor:validated?"default":"pointer"}}>Validar</button>
        <button onClick={()=>goTo((idx+1)%27)} style={{flex:1,padding:"13px 0",fontSize:14,fontWeight:"bold",color:"white",border:"none",borderRadius:14,cursor:"pointer",background:c}}>Sig {">"}</button>
      </div>

      {/* ABECEDARIO */}
      <div style={{background:"rgba(255,255,255,0.2)",borderRadius:18,padding:10,width:"100%",maxWidth:430}}>
        <div style={{fontSize:11,color:"white",textAlign:"center",marginBottom:6,fontWeight:"bold"}}>ABECEDARIO</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center"}}>
          {LT.map((l,i)=>{
            const isL = mode==="word" ? learnedWord.includes(WD[i]) : mode==="may" ? learnedMay.includes(l) : learnedMin.includes(l);
            return (
              <button key={i} onClick={()=>goTo(i)} style={{width:33,height:33,borderRadius:9,border:"none",cursor:"pointer",fontSize:11,fontWeight:"bold",fontFamily:PW,background:isL?CL[i]:i===idx?"white":"rgba(255,255,255,0.4)",color:isL?"white":i===idx?CL[i]:"white",transform:i===idx?"scale(1.18)":"scale(1)",transition:"all 0.2s"}}>
                {mode==="may"?l:mode==="min"?l.toLowerCase():WD[i].substring(0,2)}
              </button>
            );
          })}
        </div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",textAlign:"center",marginTop:8}}>
          Palabras: +5 monedas | Letras: +3 monedas
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
